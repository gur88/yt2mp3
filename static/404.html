<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Страница не найдена — AudioGrab</title>
  <meta name="robots" content="noindex" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f0f0f;
      --surface: #1a1a1a;
      --border:  #2a2a2a;
      --accent:  #ff3b3b;
      --text:    #f0f0f0;
      --muted:   #888;
      --radius:  14px;
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
    }
    .code { font-size: 15px; color: var(--accent); font-weight: 700; margin-bottom: 8px; letter-spacing: 1px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.3px; }
    p { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 24px; }
    .home-link {
      display: inline-block;
      padding: 12px 28px;
      background: var(--accent);
      color: var(--text);
      text-decoration: none;
      border-radius: calc(var(--radius) / 2);
      font-size: 14px;
      font-weight: 600;
      transition: opacity .15s;
    }
    .home-link:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1>Страница не найдена</h1>
    <p>Такой страницы не существует или она была перемещена.</p>
    <a class="home-link" href="/">← На главную</a>
  </div>
</body>
</html>
